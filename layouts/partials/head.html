<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Title }}{{ end }}">
<title>{{ if not .IsHome }}{{ .Title }} · {{ end }}{{ site.Title }}</title>

{{- /* Prevent dark mode flash: set theme before CSS loads */ -}}
<script>
  (function(){var t=localStorage.getItem('theme');if(t==='dark'||(t===null&&window.matchMedia('(prefers-color-scheme: dark)').matches)){document.documentElement.setAttribute('data-theme','dark');}})();
</script>

{{- /* Google Fonts */ -}}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

{{- /* Site CSS via Hugo Pipes */ -}}
{{- $css := resources.Get "css/main.css" | fingerprint -}}
<link rel="stylesheet" href="{{ $css.Permalink }}">

{{- /* GSAP + ScrollTrigger */ -}}
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" defer></script>
